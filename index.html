<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width'>
  <title>Attune Studio — Legal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0f0f11;
      color: #f0eff2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-family: Georgia, serif;
      font-size: 32px;
      font-weight: normal;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: #7c7a85;
      margin-bottom: 40px;
      font-weight: 300;
      font-family: 'DM Sans', sans-serif;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .link-card {
      background: #17171a;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 18px 20px;
      text-decoration: none;
      color: #f0eff2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.15s, background 0.15s;
    }
    .link-card:hover {
      border-color: rgba(255,255,255,0.13);
      background: #1e1e22;
    }
    .link-card-left { text-align: left; }
    .link-title { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
    .link-sub { font-size: 12px; color: #7c7a85; }
    .arrow { color: #7c7a85; font-size: 18px; }
    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #4a4852;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Attune Studio</h1>
    <p class="subtitle">Legal documents for the Attune Studio app</p>

    <div class="links">
      <a href="privacy-policy.html" class="link-card">
        <div class="link-card-left">
          <div class="link-title">Privacy Policy</div>
          <div class="link-sub">How we collect and use your data</div>
        </div>
        <span class="arrow">→</span>
      </a>

      <a href="terms-and-conditions.html" class="link-card">
        <div class="link-card-left">
          <div class="link-title">Terms &amp; Conditions</div>
          <div class="link-sub">Rules and guidelines for using Attune Studio</div>
        </div>
        <span class="arrow">→</span>
      </a>
    </div>

    <p class="footer">© 2026 Yeşim Dilara Mollaahmetoğlu. All rights reserved.</p>
  </div>
</body>
</html>
